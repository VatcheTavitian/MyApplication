apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-argo-application
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/VatcheTavitian/MyApplication.git
    targetRevision: HEAD
    path: dev

  destination:
    server: https://kubernetes.default.svc # this is the internal service name of k8 api server
    namespace: dev

  syncPolicy:
    syncOptions:
      - CreateNamespace=true

    automated:
      selfHeal: true
      prune: true