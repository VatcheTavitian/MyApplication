apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: dev
  labels:
    app: app
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
     containers:
      - name: myapp
        image: paulbouwer/hello-kubernetes:1.9
        env:
          - name: APPNAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.labels['app']
          - name: CUSTOM
            value: "This is a custom message!!"
          - name: MESSAGE
            value: "Hello from $(APPNAME)! $(CUSTOM)"
        ports:
          - containerPort: 80
      - name: app
        image: wil42/playground:v2
        ports:
          - containerPort: 8888
         
  
